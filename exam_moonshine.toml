[[sprint.question]]
number = 1
tier = "RECALL"
difficulty = 1
xp = 10
text = "What are the THREE states in the moonshine-daemon state machine?"
type = "single"
options = [
    "Idle, Recording, Processing",
    "Stopped, Listening, Transcribing",
    "Ready, Capturing, Outputting",
    "Init, Active, Done"
]
answer = 0
hint = "Think about the three phases: waiting, capturing audio, converting to text."
explanation = "The daemon cycles through Idle (waiting for trigger), Recording (capturing audio from mic), and Processing (running Moonshine AI model). Clear separation enables responsive UI feedback."
file_ref = "internal/daemon/daemon.go:52-65"

[[sprint.question]]
number = 2
tier = "RECALL"
difficulty = 1
xp = 10
text = "What IPC mechanism does moonshine-daemon use?"
type = "single"
options = [
    "TCP socket on port 9999",
    "Unix domain socket",
    "Named pipe (FIFO)",
    "Shared memory"
]
answer = 1
hint = "Same as piper-daemon - local, secure, no network."
explanation = "Unix domain socket at /tmp/moonshine/moonshine.sock. Provides secure local IPC without network exposure. Text-based protocol for simple client implementation."
file_ref = "internal/daemon/socket.go:25-40"

[[sprint.question]]
number = 3
tier = "COMPREHENSION"
difficulty = 2
xp = 10
text = "The 'toggle' command starts or stops recording. What determines which action occurs?"
type = "single"
options = [
    "A separate 'mode' parameter",
    "Current state: Idle→start recording, Recording→stop and process",
    "Toggle always starts, use 'stop' to stop",
    "User must specify 'toggle start' or 'toggle stop'"
]
answer = 1
hint = "It's a true toggle - behavior depends on current state."
explanation = "Toggle checks current state. If Idle, transitions to Recording. If Recording, stops and transitions to Processing. This enables single-key push-to-talk workflows."
file_ref = "internal/daemon/daemon.go:145-170"

[[sprint.question]]
number = 4
tier = "COMPREHENSION"
difficulty = 2
xp = 10
text = "Why does moonshine use a SEPARATE Processing state instead of transcribing during Recording?"
type = "single"
options = [
    "The AI model can't run while recording",
    "Allows user to see 'processing...' feedback",
    "Recording quality is affected by CPU load",
    "Both B and C are correct"
]
answer = 3
hint = "Consider both UX and technical factors."
explanation = "Separating Recording from Processing lets the UI show progress feedback AND prevents CPU-intensive transcription from degrading audio capture quality. The model runs after audio is complete."
file_ref = "internal/daemon/daemon.go:175-195"

[[sprint.question]]
number = 5
tier = "APPLICATION"
difficulty = 3
xp = 10
text = "In 'freespeech' (always-listening) mode, what triggers processing of recorded audio?"
type = "single"
options = [
    "User says a wake word",
    "Silence detection - pause in speech triggers processing",
    "Fixed time intervals (every 5 seconds)",
    "Manual 'process' command"
]
answer = 1
hint = "Natural speech has natural pauses."
explanation = "Freespeech mode uses voice activity detection. Recording continues until silence threshold is met, then audio chunk is processed. This enables continuous dictation without manual triggers."
file_ref = "internal/daemon/daemon.go:220-250"

